name: Register GitHub deployment
description: Create a GitHub deployment record for a service.

inputs:
  github-token:
    description: GitHub token used to create the deployment.
    required: true
  environment:
    description: Deployment environment name.
    required: true
  environment-url:
    description: URL shown in the GitHub deployment.
    required: false
    default: ""
  description:
    description: Deployment status description.
    required: false
    default: Deployment completed.

runs:
  using: composite
  steps:
    - name: Register deployment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const deployment = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.sha,
            environment: '${{ inputs.environment }}',
            auto_merge: false,
            required_contexts: [],
            description: '${{ inputs.description }}'
          });

          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: deployment.data.id,
            state: 'success',
            environment_url: '${{ inputs.environment-url }}',
            description: '${{ inputs.description }}'
          });
