apiVersion: apps/v1
kind: Deployment
metadata:
  name: mood-frontend
  namespace: mood-journal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mood-frontend
  template:
    metadata:
      labels:
        app: mood-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/replace-me/mood-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mood-journal
spec:
  type: LoadBalancer
  selector:
    app: mood-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
