apiVersion: apps/v1
kind: Deployment
metadata:
  name: mood-api-service
  namespace: mood-journal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mood-api-service
  template:
    metadata:
      labels:
        app: mood-api-service
    spec:
      containers:
        - name: api-service
          image: ghcr.io/replace-me/mood-api-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: postgres://mood_user:mood_password@postgres:5432/mood_journal
            - name: MESSAGE_SERVICE_URL
              value: http://message-service:3001
            - name: ADMIN_USERNAME
              value: admin
            - name: ADMIN_PASSWORD
              value: admin123
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: mood-journal
spec:
  selector:
    app: mood-api-service
  ports:
    - name: http
      port: 3000
      targetPort: 3000
